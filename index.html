<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .profile-img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
            background-color: #ccc;
        }
        .link-button {
            display: block;
            background-color: white;
            color: black;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            border: 1px solid #ddd;
            transition: background-color 0.3s;
        }
        .link-button:hover {
            background-color: #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Replace with your image link -->
        <img src="profile.jpg" alt="Profile" class="profile-img">
        <h1>Yakkai Nalan Wellness Centre</h1>
        <a href="https://maps.app.goo.gl/BD1hZTkxNAFp1CKZ7" class="link-button">Location</a>
    </div>
</body>
</html>
